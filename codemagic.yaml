workflows:
  ios-debug:
    name: iOS Debug (no codesign) - oxius_native
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: 15.3
      cocoapods: default

    scripts:
      - name: Flutter pub get
        script: |
          cd oxius_native
          flutter pub get

      - name: Build iOS (debug, no codesign)
        script: |
          cd oxius_native
          flutter build ios --debug --no-codesign

    artifacts:
      - oxius_native/build/ios/iphoneos/*.app
      - oxius_native/ios/Podfile.lock

  ios-production:
    name: iOS Production IPA - oxius_native
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: AdsyClub App Store Connect

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.oxius.app
      flutter: stable
      xcode: 15.3
      cocoapods: default

    scripts:
      - name: Set up code signing settings on Xcode project
        script: |
          cd oxius_native
          xcode-project use-profiles

      - name: Flutter pub get
        script: |
          cd oxius_native
          flutter pub get

      # The Firestore precompiled-framework download (invertase git + ~300MB
      # curl from GitHub releases) occasionally dies with "Connection reset by
      # peer" on CI. Install pods explicitly with retries so one transient
      # network failure doesn't kill the whole build; `flutter build ipa`
      # then reuses the installed pods.
      - name: Install CocoaPods dependencies (with retry)
        script: |
          cd oxius_native/ios
          ok=0
          for i in 1 2 3; do
            if pod install --repo-update; then ok=1; break; fi
            echo "pod install attempt $i failed — cleaning partial caches, retrying in 20s"
            pod cache clean FirebaseFirestore --all || true
            sleep 20
          done
          [ "$ok" = "1" ] || exit 1

      - name: Build iOS IPA (release)
        script: |
          cd oxius_native
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - oxius_native/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
